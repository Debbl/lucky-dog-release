name: Release

# Triggered manually. We don't auto-build on every push to the source repo —
# packaging across 4 OSes is slow and burns a lot of artifact storage.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Source repo ref (branch / tag / sha)'
        required: false
        default: 'main'
      release_tag:
        description: 'Optional tag to publish as a GitHub Release on this repo (e.g. v0.1.0). Leave blank to only upload artifacts.'
        required: false
        default: ''
      draft:
        description: 'Publish the GitHub Release as a draft'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: arm64
          - os: macos-15-intel
            platform: mac
            arch: x64
          # Pinned to windows-2025: windows-latest may resolve to an image whose
          # VS toolchain is not yet detected by node-gyp (breaks native dep rebuild).
          - os: windows-2025
            platform: win
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source repo (private)
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: ${{ vars.SOURCE_REPO }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          ref: ${{ inputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          package_json_file: package.json

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-${{ matrix.arch }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (renderer + main bundle)
        run: pnpm run build

      - name: Make (electron-builder package)
        env:
          NODE_OPTIONS: --max_old_space_size=8192
        run: pnpm run make -- --${{ matrix.arch }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: build-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.deb
            release/*.AppImage
            release/*.yml
            release/*.blockmap
          if-no-files-found: error

  release:
    needs: build
    if: ${{ inputs.release_tag != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: dist-artifacts

      - name: Merge artifacts
        run: |
          mkdir -p release

          # macOS arm64/x64 share the same artifactName template without ${arch},
          # so copy per-arch to avoid the second cp overwriting the first.
          for arch in arm64 x64; do
            src="dist-artifacts/build-mac-${arch}"
            if [ -d "$src" ]; then
              cp "$src"/*.dmg release/ 2>/dev/null || true
              cp "$src"/*.blockmap release/ 2>/dev/null || true
            fi
          done

          ARM64_YML="dist-artifacts/build-mac-arm64/latest-mac.yml"
          X64_YML="dist-artifacts/build-mac-x64/latest-mac.yml"
          MERGED_YML="release/latest-mac.yml"

          if [ -f "$ARM64_YML" ] && [ -f "$X64_YML" ]; then
            echo "Merging latest-mac.yml files..."
            VERSION=$(grep "^version:" "$ARM64_YML" | head -1)
            RELEASE_DATE=$(grep "^releaseDate:" "$ARM64_YML" | head -1)
            ARM64_FILES=$(awk '/^files:/{flag=1; next} /^[a-zA-Z]/ && flag{flag=0} flag' "$ARM64_YML")
            X64_FILES=$(awk '/^files:/{flag=1; next} /^[a-zA-Z]/ && flag{flag=0} flag' "$X64_YML")
            PATH_LINE=$(grep "^path:" "$ARM64_YML" | head -1)
            SHA512_LINE=$(grep "^sha512:" "$ARM64_YML" | head -1)
            {
              echo "$VERSION"
              echo "files:"
              echo "$ARM64_FILES"
              echo "$X64_FILES"
              echo "$PATH_LINE"
              echo "$SHA512_LINE"
              echo "$RELEASE_DATE"
            } > "$MERGED_YML"
            cat "$MERGED_YML"
          elif [ -f "$ARM64_YML" ]; then
            cp "$ARM64_YML" "$MERGED_YML"
          elif [ -f "$X64_YML" ]; then
            cp "$X64_YML" "$MERGED_YML"
          fi

          cp dist-artifacts/build-win-x64/* release/ 2>/dev/null || true
          cp dist-artifacts/build-linux-x64/* release/ 2>/dev/null || true

          rm -rf dist-artifacts
          echo "=== All artifacts ==="
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_tag }}
          draft: ${{ inputs.draft == 'true' }}
          generate_release_notes: false
          files: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.deb
            release/*.AppImage
            release/*.yml
            release/*.blockmap
          body: |
            Built from `${{ vars.SOURCE_REPO }}@${{ inputs.ref }}`.
